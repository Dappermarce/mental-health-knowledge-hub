<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neuronGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8e8e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Brain outline -->
  <path d="M200 50 C 250 40, 320 60, 340 120 C 360 180, 340 220, 320 250 C 300 280, 270 300, 240 310 C 210 320, 180 315, 160 300 C 140 285, 125 265, 120 240 C 115 215, 120 190, 130 170 C 140 150, 160 130, 180 120 C 190 110, 195 80, 200 50 Z" 
        fill="url(#brainGradient)" 
        stroke="#fff" 
        stroke-width="3" 
        opacity="0.9">
    <animate attributeName="d" 
             values="M200 50 C 250 40, 320 60, 340 120 C 360 180, 340 220, 320 250 C 300 280, 270 300, 240 310 C 210 320, 180 315, 160 300 C 140 285, 125 265, 120 240 C 115 215, 120 190, 130 170 C 140 150, 160 130, 180 120 C 190 110, 195 80, 200 50 Z;
                     M200 55 C 255 45, 325 65, 345 125 C 365 185, 345 225, 325 255 C 305 285, 275 305, 245 315 C 215 325, 185 320, 165 305 C 145 290, 130 270, 125 245 C 120 220, 125 195, 135 175 C 145 155, 165 135, 185 125 C 195 115, 200 85, 200 55 Z;
                     M200 50 C 250 40, 320 60, 340 120 C 360 180, 340 220, 320 250 C 300 280, 270 300, 240 310 C 210 320, 180 315, 160 300 C 140 285, 125 265, 120 240 C 115 215, 120 190, 130 170 C 140 150, 160 130, 180 120 C 190 110, 195 80, 200 50 Z" 
             dur="4s" 
             repeatCount="indefinite"/>
  </path>
  
  <!-- Brain hemispheres separator -->
  <path d="M200 70 Q 200 150, 200 230 Q 200 310, 200 330" 
        stroke="#fff" 
        stroke-width="2" 
        fill="none" 
        opacity="0.6"/>
  
  <!-- Neural pathways -->
  <g stroke="#fff" stroke-width="1.5" fill="none" opacity="0.4">
    <!-- Left hemisphere pathways -->
    <path d="M150 120 Q 170 140, 180 160 Q 190 180, 185 200">
      <animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M160 100 Q 180 120, 175 140 Q 170 160, 165 180">
      <animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M140 140 Q 160 160, 155 180 Q 150 200, 145 220">
      <animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </path>
    
    <!-- Right hemisphere pathways -->
    <path d="M250 120 Q 230 140, 220 160 Q 210 180, 215 200">
      <animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M240 100 Q 220 120, 225 140 Q 230 160, 235 180">
      <animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="2.7s" repeatCount="indefinite"/>
    </path>
    <path d="M260 140 Q 240 160, 245 180 Q 250 200, 255 220">
      <animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="3.2s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Neurons -->
  <g fill="url(#neuronGradient)">
    <!-- Left hemisphere neurons -->
    <circle cx="160" cy="130" r="3">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="140" cy="160" r="2.5">
      <animate attributeName="r" values="2.5;4;2.5" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="180" r="3.5">
      <animate attributeName="r" values="3.5;5.5;3.5" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="155" cy="210" r="2">
      <animate attributeName="r" values="2;4;2" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Right hemisphere neurons -->
    <circle cx="240" cy="130" r="3">
      <animate attributeName="r" values="3;5;3" dur="2.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="160" r="2.5">
      <animate attributeName="r" values="2.5;4;2.5" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="230" cy="180" r="3.5">
      <animate attributeName="r" values="3.5;5.5;3.5" dur="3.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="245" cy="210" r="2">
      <animate attributeName="r" values="2;4;2" dur="2.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.7s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Frontal lobe detail -->
  <ellipse cx="200" cy="90" rx="40" ry="20" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  
  <!-- Thought bubbles -->
  <g fill="rgba(255,255,255,0.3)">
    <circle cx="120" cy="80" r="8">
      <animate attributeName="cy" values="80;60;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="110" cy="95" r="5">
      <animate attributeName="cy" values="95;75;95" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="80" r="8">
      <animate attributeName="cy" values="80;60;80" dur="4.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="290" cy="95" r="5">
      <animate attributeName="cy" values="95;75;95" dur="4.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4.7s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Brainwave visualization -->
  <g stroke="#fff" stroke-width="1" fill="none" opacity="0.5">
    <path d="M80 300 Q 120 290, 160 300 Q 200 310, 240 300 Q 280 290, 320 300">
      <animate attributeName="d" 
               values="M80 300 Q 120 290, 160 300 Q 200 310, 240 300 Q 280 290, 320 300;
                       M80 300 Q 120 310, 160 300 Q 200 290, 240 300 Q 280 310, 320 300;
                       M80 300 Q 120 290, 160 300 Q 200 310, 240 300 Q 280 290, 320 300" 
               dur="3s" 
               repeatCount="indefinite"/>
    </path>
    <path d="M70 320 Q 110 310, 150 320 Q 190 330, 230 320 Q 270 310, 310 320">
      <animate attributeName="d" 
               values="M70 320 Q 110 310, 150 320 Q 190 330, 230 320 Q 270 310, 310 320;
                       M70 320 Q 110 330, 150 320 Q 190 310, 230 320 Q 270 330, 310 320;
                       M70 320 Q 110 310, 150 320 Q 190 330, 230 320 Q 270 310, 310 320" 
               dur="3.5s" 
               repeatCount="indefinite"/>
    </path>
  </g>
</svg>
